version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - REGION=ap-south-1
      - REPO_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/nexu-demo
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $REPO_URI
  build:
    commands:
      - echo Building image...
      - docker build -t nexu-demo .
      - docker tag nexu-demo:latest $REPO_URI:latest
  post_build:
    commands:
      - echo Pushing image...
      - docker push $REPO_URI:latest
      - echo Writing image tag file...
      - printf "$REPO_URI:latest" > image.txt

artifacts:
  files:
    - image.txt

