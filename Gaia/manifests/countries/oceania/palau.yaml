
apiVersion: apps/v1
kind: Deployment
metadata:
  name: palau-sim
  labels:
    app: country-sim
    country: palau

spec:
  replicas: 1

  selector:
    matchLabels:
      app: country-sim
      country: palau

  template:
    metadata:
      labels:
        app: country-sim
        country: palau
        continent: oceania

    spec:
      containers:
      - name: simulator
        image: gaia/country-sim:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8080
          name: metrics

        resources:
          requests:
            cpu: "5m"
            memory: "8Mi"
          limits:
            cpu: "20m"
            memory: "32Mi"

        env:
        - name: COUNTRY
          value: "palau"

        - name: CONTINENT
          value: "oceania"

        - name: POPULATION
          value: "18579"

        - name: GROWTH_RATE
          value: "0.01"

        - name: REDIS_HOST
          value: "host.docker.internal"

        - name: REDIS_PORT
          value: "6379"
